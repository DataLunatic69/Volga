services:
  postgres:
    image: postgres:15-alpine
    container_name: nexcell_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexcell_db  # This creates database named "nexcell_db"
      POSTGRES_USER: nexcell
      POSTGRES_PASSWORD: nexcell_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexcell -d nexcell_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexcell_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nexcell_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexcell:nexcell_password@postgres:5432/nexcell_db
      - REDIS_URL=redis://redis:6379
      - APP_ENV=docker
      - DEBUG=True
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Simple command - don't auto-run seed script
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data: